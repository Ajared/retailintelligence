name: Code Quality

on:
  push:
    branches:
      - dev
    paths:
      - "backend/**"
  pull_request:
    branches:
      - dev
    paths:
      - "backend/**"
  workflow_dispatch:

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 23

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: false

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./backend

      - name: Run Lint
        run: pnpm lint
        working-directory: ./backend

      - name: Run Typecheck
        run: pnpm typecheck
        working-directory: ./backend

      - name: Run Tests
        run: pnpm test
        working-directory: ./backend

      - name: Build Project
        run: pnpm build
        working-directory: ./backend
